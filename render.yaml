services:
  - type: web
    name: notes-agent
    env: python
    plan: free
    healthCheckPath: /
    buildCommand: "pip install uv && uv sync --frozen --no-dev"
    startCommand: "uv run uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: IGBO_ARCHIVES_TOKEN
        sync: false
